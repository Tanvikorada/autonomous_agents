services:
  - type: web
    name: autonomous-agents-backend
    env: docker
    region: ohio
    plan: free
    dockerCommand: gunicorn -w 1 -k uvicorn.workers.UvicornWorker backend.main:app --bind 0.0.0.0:$PORT
    envVars:
      - key: LLM_PROVIDER
        value: groq
      - key: GROQ_MODEL
        value: llama3-70b-8192
      - key: GROQ_API_KEY
        sync: false
